version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: livancode_postgres
    environment:
      POSTGRES_DB: livancode_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - livancode_network

  backend:
    build: ./backend
    container_name: livancode_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/livancode_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - postgres
    networks:
      - livancode_network

  frontend:
    build: ./frontend
    container_name: livancode_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - livancode_network

volumes:
  postgres_data:

networks:
  livancode_network:
    driver: bridge
